experiment:
  run_name: null
  output_dir: outputs
  seed: 42
  deterministic: true

data:
  csv_path: data/processed/modelv1_dataset.csv
  # Build this cache with --face-preprocess deca --deca-crop-scale 1.25.
  deca_cache_path: data/processed/deca_features_deca_crop_v1.npz
  deca_face_preprocess: deca
  deca_crop_scale: 1.25
  split_mode: random_80_20
  all_datasets: ["3", "4", "5"]
  val_ratio: 0.2
  split_seed: 42
  batch_size: 32
  num_workers: 0
  pin_memory: true
  normalize_images: true
  # ModelV1 consumes the cached 236-D DECA vector, not a raw face tensor.
  load_face_image: false

model:
  deca_feature_dim: 236
  crop_cam_dim: 36
  scene_dim: 25
  uv_dim: 2
  face_embedding_dim: 128
  face_hidden_dims: [256]
  eye_embedding_dim: 128
  per_eye_embedding_dim: 96
  eye_backbone: resnet18
  eye_backbone_weights: null
  crop_cam_embedding_dim: 64
  crop_cam_hidden_dims: [128]
  scene_embedding_dim: 64
  scene_hidden_dims: [128]
  fusion_hidden_dims: [256, 128]
  branch_dropout: 0.1
  fusion_dropout: 0.2
  share_eye_encoder: true
  detach_deca_features: true

loss:
  beta_mm: 30.0

training:
  epochs: 300
  device: auto
  amp: true
  grad_clip_norm: 1.0
  optimizer:
    name: adamw
    lr: 0.0003
    weight_decay: 0.0001
  scheduler:
    name: cosine
    eta_min: 0.000001
  checkpoint:
    save_last: true
    monitor: val/epe_mm

logging:
  terminal_every_epochs: 10
  wandb:
    enabled: true
    project: ModelV1_random_80_20_100_deca_crop
    entity: null
    mode: online
    tags: [ModelV1, random_80_20, deca_official_crop, crop_scale_1_25, epoch_300]
